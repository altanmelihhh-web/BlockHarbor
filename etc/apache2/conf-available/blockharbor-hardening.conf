# BlockHarbor — Apache server-wide hardening
# Enable: sudo a2enconf blockharbor-hardening
# (Installed by bin/install.sh into /etc/apache2/conf-available/)

# Hide Apache version + OS
ServerTokens Prod
ServerSignature Off

# Disable TRACE (XST mitigation)
TraceEnable Off

# Set default file uploads cap (BlockHarbor uses smaller per-handler limits)
# These guard against accidental DoS via large uploads
LimitRequestBody 10485760
