# BlockHarbor — fail2ban filter
# Matches failed login lines in app.log written by AuthService.
# Installed by bin/install.sh into /etc/fail2ban/filter.d/blockharbor.conf
#
# AuthService logs (planned format, P1+):
#   [<timestamp>] auth.WARNING: login_failed {"username":"...","ip":"<HOST>","reason":"..."}
#   [<timestamp>] auth.WARNING: rate_limited_ip {"ip":"<HOST>"}
#   [<timestamp>] auth.WARNING: account_locked {"username":"...","ip":"<HOST>"}

[Definition]
failregex = ^\[.+\] auth\.(WARNING|ERROR): (login_failed|rate_limited_ip|account_locked) \{.*"ip":"<HOST>".*\}$
ignoreregex =
