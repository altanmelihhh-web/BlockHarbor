services:
  postgres:
    image: postgres:14-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-blockharbor}
      POSTGRES_USER: ${DB_USER:-blockharbor_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-blockharbor_app}"]
      interval: 5s
      timeout: 3s
      retries: 10

  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      DB_HOST: postgres
    volumes:
      # populated from the baked image's /app/public on first run;
      # nginx mounts read-only so it can serve built assets
      - app_public:/app/public
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - app_public:/app/public:ro
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${HTTP_PORT:-8090}:80"
    depends_on:
      - php

volumes:
  pg_data:
  app_public:
