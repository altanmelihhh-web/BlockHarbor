services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8090}:80"
    env_file: .env
    volumes:
      - cwe_data:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/blacklist/cyberwebeyeos/login.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  cwe_data:
