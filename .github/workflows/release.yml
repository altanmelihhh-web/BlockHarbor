name: Release

on:
  push:
    tags:
      - 'v*'
      - 'p[0-9]-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes from CHANGELOG
        id: notes
        run: |
          # Pull the "## [Unreleased]" section from CHANGELOG.md if present
          awk '/^## \[Unreleased\]/{flag=1;next} /^## \[/{flag=0} flag' CHANGELOG.md > /tmp/notes.md
          if [[ ! -s /tmp/notes.md ]]; then
            # Fallback: generate from git log
            PREVIOUS=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [[ -n "$PREVIOUS" ]]; then
              git log "$PREVIOUS..HEAD" --pretty=format:'- %s' --no-merges > /tmp/notes.md
            else
              git log --pretty=format:'- %s' --no-merges > /tmp/notes.md
            fi
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          body_path: /tmp/notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
          generate_release_notes: true
