name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: blockharbor_app
          POSTGRES_PASSWORD: ci_test_pass
          POSTGRES_DB: blockharbor
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U blockharbor_app"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo, pdo_pgsql, mbstring, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install PHP deps
        run: composer install --no-progress --prefer-dist

      - name: Create test .env
        run: |
          cat > .env <<EOF
          APP_ENV=testing
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_NAME=blockharbor
          DB_USER=blockharbor_app
          DB_PASSWORD=ci_test_pass
          DB_MIGRATOR_USER=blockharbor_app
          DB_MIGRATOR_PASSWORD=ci_test_pass
          DB_SSLMODE=disable
          SESSION_LIFETIME=1800
          EOF

      - name: Create PG extensions (superuser)
        run: |
          PGPASSWORD=ci_test_pass psql -h 127.0.0.1 -U blockharbor_app -d blockharbor \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;" \
            -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Run migrations
        run: vendor/bin/phinx migrate

      - name: PHPUnit
        run: vendor/bin/phpunit --colors=always

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Psalm
        run: vendor/bin/psalm --no-progress --show-info=false || true

      - name: Composer audit
        run: composer audit || true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: npm ci
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Verify build output
        run: |
          test -s public/assets/app.css
          test -s public/assets/app.js
