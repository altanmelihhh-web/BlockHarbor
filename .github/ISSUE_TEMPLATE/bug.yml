name: Bug report
description: Report something that's broken or behaving unexpectedly
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        For **security vulnerabilities**, please email instead — see [SECURITY.md](../SECURITY.md).

  - type: input
    id: version
    attributes:
      label: BlockHarbor version / commit
      placeholder: e.g. v0.1.0-p1 or commit hash
    validations:
      required: true

  - type: input
    id: deployment
    attributes:
      label: Deployment mode
      description: Apache + host? Docker Compose? Other?
      placeholder: e.g. Apache 2.4 + mod_php 8.1 on Ubuntu 22.04
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: From `/var/log/blockharbor/app.log` or `/var/log/apache2/blockharbor-error.log`
      render: text
