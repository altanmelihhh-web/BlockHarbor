name: Feature request
description: Suggest an enhancement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check [ROADMAP.md](../../ROADMAP.md) first — your idea may already be
        on the plan.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case, not the implementation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: phase
    attributes:
      label: Which phase would this fit?
      options:
        - P1 (Foundation + Auth)
        - P2 (Audit + 2FA)
        - P3 (IOC Domain)
        - P4 (Feeds + CVE)
        - P5 (Lists + Notifications + API)
        - P6 (Migration + Cutover)
        - P7 (GitHub Readiness)
        - Post-P7 (new initiative)
