<VirtualHost *:80>
    ServerName localhost

    # Pass Docker env vars to PHP (getenv() reads these)
    PassEnv CWE_ADMIN_USERNAME
    PassEnv CWE_ADMIN_PASSWORD_HASH
    PassEnv CWE_API_KEYS
    PassEnv CWE_VT_API_KEY
    PassEnv CWE_GREYNOISE_API_KEY
    PassEnv CWE_IPGEOLOCATION_API_KEY
    PassEnv CWE_CONTACT_EMAIL

    # Serve the app at the path the code expects
    Alias /blacklist/cyberwebeyeos /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Redirect bare root to app
    RedirectMatch 302 ^/?$ /blacklist/cyberwebeyeos/

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
